<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificat</title>
    <meta name="manifest.type" content="browser_action" />
    <style>
      :root {
        --color-canvas: #fafafa;
        --color-ink: #171717;
        --color-hairline: #ebebeb;
        --color-body: #4d4d4d;
        --color-mute: #8f8f8f;
        --color-elevated: #ffffff;
        --color-primary: #0070f3;
        --spacing-xs: 8px;
        --spacing-sm: 12px;
        --spacing-md: 16px;
        --rounded-sm: 6px;
        font-family: 'Geist Sans', Inter, Arial, sans-serif;
        font-size: 13px;
        color: var(--color-body);
        background: var(--color-canvas);
      }
      body {
        margin: 0;
        padding: var(--spacing-sm);
        width: 320px;
        box-sizing: border-box;
      }
      h3 {
        margin: 0 0 var(--spacing-xs) 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--color-ink);
        letter-spacing: -0.4px;
      }
      .btn-primary-small {
        display: block;
        width: 100%;
        height: 32px;
        padding: 0 6px;
        border-radius: var(--rounded-sm);
        border: none;
        background: var(--color-ink);
        color: var(--color-elevated);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        box-sizing: border-box;
        margin-bottom: 6px;
      }
      .btn-ghost-small {
        display: block;
        width: 100%;
        height: 32px;
        padding: 0 6px;
        border-radius: var(--rounded-sm);
        border: 1px solid var(--color-hairline);
        background: var(--color-elevated);
        color: var(--color-body);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        box-sizing: border-box;
        margin-bottom: 6px;
      }
      #status-text { font-size: 12px; color: var(--color-mute); margin-bottom: var(--spacing-xs); }
      #consent-screen { padding: var(--spacing-xs) 4px; }
      #consent-screen p { font-size: 12px; line-height: 1.5; color: var(--color-body); margin: 0 0 var(--spacing-sm) 0; }
      #consent-screen a { color: var(--color-primary); }
      #main-ui { display: none; }
    </style>
  </head>
  <body>
    <div id="consent-screen">
      <h3>Confidențialitate</h3>
      <p>
        Verificat captează audio pentru a verifica afirmațiile în timp real.
        Datele audio sunt procesate și nu sunt stocate după verificare.
      </p>
      <p>
        <a href="%VITE_WEB_HOST%/privacy" target="_blank">Politica de Confidențialitate</a>
      </p>
      <button id="btn-accept-consent" class="btn-primary-small">Accept și Continuă</button>
    </div>
    <div id="main-ui">
      <div id="status-text">Pregătit</div>
      <button id="btn-start" class="btn-primary-small">Începe Ascultarea</button>
      <button id="btn-stop" class="btn-ghost-small" style="display:none;">Oprește</button>
      <button id="btn-open" class="btn-ghost-small">Deschide Panoul Lateral</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      background-color: #faf9f5;
      color: #141413;
      font-family: 'Lora', Georgia, serif;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e8e6dc;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 12px rgba(20, 20, 19, 0.05);
    }
    .logo {
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: #141413;
      text-decoration: none;
      margin-bottom: 24px;
      display: block;
      text-align: center;
    }
    .logo-accent {
      color: #d97757;
    }
    h2 {
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 600;
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 16px;
      color: #141413;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #141413;
      margin-top: 0;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background-color: #141413;
      color: #faf9f5;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 6px;
      text-align: center;
    }
    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid #e8e6dc;
      font-size: 13px;
      color: #b0aea5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="{{ .SiteURL }}" class="logo">verificat<span class="logo-accent">.xyz</span></a>
    <h2>Confirmați adresa de email</h2>
    <p>Vă mulțumim pentru înregistrarea pe verificat.xyz. Pentru a vă confirma adresa de email, vă rugăm să faceți click pe butonul de mai jos:</p>
    <div style="text-align: center;">
      <a href="{{ .ConfirmationURL }}" class="btn">Confirmați adresa de email</a>
    </div>
    <div class="footer">
      Dacă nu ați solicitat acest lucru, puteți ignora acest mesaj în siguranță.
    </div>
  </div>
</body>
</html>

name: CI Pipeline

on:
  pull_request:
    branches: [development]

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: Lint & Scan
    runs-on: ubuntu-latest

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (dependency scan)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: OpenAPI spec drift check
        run: |
          echo "::group::OpenAPI Spec Diff Check"
          pnpm --filter api generate:spec
          if ! git diff --exit-code docs/openapi.yaml; then
            echo "::error::OpenAPI spec is out of date. Run 'pnpm --filter api generate:spec' and commit docs/openapi.yaml."
            exit 1
          fi
          echo "::endgroup::"

      - name: Run lint (affected packages only)
        run: pnpm turbo run lint --filter=...[origin/${{ github.base_ref }}]

  build:
    name: Build Packages
    runs-on: ubuntu-latest

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build (affected packages only)
        run: pnpm turbo run build --filter=...[origin/${{ github.base_ref }}]

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (affected packages only)
        run: pnpm turbo run test --filter=...[origin/${{ github.base_ref }}]

      - name: Golden set regression gate
        if: always()
        run: |
          if git diff --name-only origin/${{ github.base_ref }} | grep -qE 'packages/fact-verification/'; then
            echo "::group::Golden Set Regression Suite"
            pnpm turbo run test:golden --filter=verificat-fact-verification
            echo "::endgroup::"
          else
            echo "No fact-verification changes — skipping golden set gate."
          fi

      - name: SSRF rejection gate
        if: always()
        run: |
          echo "::group::SSRF Rejection Tests"
          pnpm turbo run test:ssrf --filter=api
          echo "::endgroup::"

      - name: Per-stage OTel latency gate
        if: always()
        run: |
          echo "::group::Per-stage Latency OTel Span Verification"
          pnpm turbo run test:e2e --filter=api
          echo "::endgroup::"

  docker:
    name: Docker Build Simulation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Image (load only — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: web-ci:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Web image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: 'web-ci:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build API Image (load only — no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          load: true
          tags: api-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on API image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: 'api-ci:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

name: CI Test

on:
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (affected packages only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo run test --filter=...[origin/${{ github.base_ref }}]
          else
            pnpm turbo run test
          fi

      - name: Golden set regression gate
        if: always()
        run: |
          if git diff --name-only origin/${{ github.base_ref || 'main' }} | grep -qE 'packages/fact-verification/'; then
            echo "::group::Golden Set Regression Suite"
            pnpm turbo run test:golden --filter=verificat-fact-verification
            echo "::endgroup::"
          else
            echo "No fact-verification changes — skipping golden set gate."
          fi

      - name: SSRF rejection gate
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::group::SSRF Rejection Tests"
            pnpm turbo run test:ssrf --filter=api
            echo "::endgroup::"
          else
            echo "Skipping SSRF gate on push (runs on PR)."
          fi

      - name: Per-stage OTel latency gate
        if: always()
        run: |
          echo "::group::Per-stage Latency OTel Span Verification"
          pnpm turbo run test:e2e --filter=api
          echo "::endgroup::"

      - name: E2E Playwright smoke test (staging)
        if: github.event_name == 'push'
        run: |
          echo "::group::Playwright E2E Smoke Test"
          pnpm --filter @verificat/e2e exec playwright install chromium
          PLAYWRIGHT_BASE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} pnpm --filter @verificat/e2e test:e2e
          echo "::endgroup::"

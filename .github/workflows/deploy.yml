name: Deploy to VPS

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }} VPS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ secrets.VPS_DIR }}

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infrastructure/deployment/docker-compose.${{ inputs.environment }}.yml, infrastructure/deployment/deploy-${{ inputs.environment }}.sh"
          target: ${{ secrets.VPS_DIR }}
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd "${{ secrets.VPS_DIR }}"

            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export GITHUB_ACTOR="${{ github.actor }}"
            export VPS_DIR="${{ secrets.VPS_DIR }}"
            export SUPABASE_PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
            export SUPABASE_DB_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
            
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            export DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}"
            export AZURE_SPEECH_KEY="${{ secrets.AZURE_SPEECH_KEY }}"
            export AZURE_SPEECH_REGION="${{ secrets.AZURE_SPEECH_REGION }}"
            export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
            export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export WHISPER_URL="${{ secrets.WHISPER_URL }}"
            export NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            export NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"

            chmod +x deploy-${{ inputs.environment }}.sh
            ./deploy-${{ inputs.environment }}.sh

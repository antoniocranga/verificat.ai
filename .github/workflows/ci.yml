name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    env:
      INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (dependency scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (dependency vulnerabilities)
        run: |
          echo "::group::pnpm Audit"
          pnpm audit --audit-level=high
          echo "::endgroup::"

      - name: OpenAPI spec drift check
        run: |
          echo "::group::OpenAPI Spec Diff Check"
          pnpm --filter api generate:spec
          if ! git diff --exit-code docs/openapi.yaml; then
            echo "::error::OpenAPI spec is out of date. Run 'pnpm --filter api generate:spec' and commit docs/openapi.yaml."
            exit 1
          fi
          echo "::endgroup::"

      - name: Run checks (affected packages only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo run build lint test --filter=...[origin/${{ github.base_ref }}]
          else
            # For pushes to main, check all packages
            pnpm turbo run build lint test
          fi

      - name: Golden set regression gate
        if: always()
        run: |
          if git diff --name-only origin/${{ github.base_ref || 'main' }} | grep -qE 'packages/fact-verification/'; then
            echo "::group::Golden Set Regression Suite"
            pnpm turbo run test:golden --filter=verificat-fact-verification
            echo "::endgroup::"
          else
            echo "No fact-verification changes — skipping golden set gate."
          fi

      - name: SSRF rejection gate
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::group::SSRF Rejection Tests"
            pnpm turbo run test:ssrf --filter=api
            echo "::endgroup::"
          else
            echo "Skipping SSRF gate on push (runs on PR)."
          fi

      - name: Per-stage OTel latency gate
        if: always()
        run: |
          echo "::group::Per-stage Latency OTel Span Verification"
          pnpm turbo run test:e2e --filter=api
          echo "::endgroup::"

      - name: E2E Playwright smoke test (staging)
        if: github.event_name == 'push'
        run: |
          echo "::group::Playwright E2E Smoke Test"
          pnpm --filter @verificat/e2e exec playwright install chromium
          PLAYWRIGHT_BASE_URL=https://staging.verificat.xyz pnpm --filter @verificat/e2e test:e2e
          echo "::endgroup::"

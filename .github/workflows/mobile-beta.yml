name: Mobile Beta

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-beta.yml'

  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment (staging or production)'
        required: true
        default: 'staging'

permissions:
  contents: read

jobs:
  validate:
    name: Validate dart-defines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Validate dart-defines
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          cd apps/mobile
          bundle exec fastlane validate env:${{ github.event.inputs.env || 'staging' }}

  beta-ios:
    name: Build & Deploy iOS Beta
    needs: validate
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install Infisical CLI
        run: |
          brew install infisical/get-cli/infisical

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: apps/mobile/.pub-cache
          key: flutter-pub-${{ hashFiles('apps/mobile/pubspec.lock') }}

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Run Fastlane beta iOS
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_READONLY: 'true'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ITC_TEAM_ID: ${{ secrets.APPLE_ITC_TEAM_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          bundle exec fastlane beta_ios env:${{ github.event.inputs.env || 'staging' }}

  beta-android:
    name: Build & Deploy Android Beta
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: apps/mobile/.pub-cache
          key: flutter-pub-${{ hashFiles('apps/mobile/pubspec.lock') }}

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Run Fastlane beta Android
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          PLAY_STORE_JSON_KEY_PATH: ${{ secrets.PLAY_STORE_JSON_KEY_PATH }}
        run: |
          bundle exec fastlane beta_android env:${{ github.event.inputs.env || 'staging' }}

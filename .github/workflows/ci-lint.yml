name: CI Lint

on:
  pull_request:
    branches: [main, staging, development]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Scan
    runs-on: ubuntu-latest

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (dependency scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: OpenAPI spec drift check
        run: |
          echo "::group::OpenAPI Spec Diff Check"
          pnpm --filter api generate:spec
          if ! git diff --exit-code docs/openapi.yaml; then
            echo "::error::OpenAPI spec is out of date. Run 'pnpm --filter api generate:spec' and commit docs/openapi.yaml."
            exit 1
          fi
          echo "::endgroup::"

      - name: Run lint (affected packages only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo run lint --filter=...[origin/${{ github.base_ref }}]
          else
            pnpm turbo run lint
          fi
